<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lift Tracker" />
  <title>Brian's Lift Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #f0f0f0; font-family: Georgia, serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    #app { max-width: 500px; margin: 0 auto; padding: 32px 18px 80px; }
    input[type=number], textarea { background: #1e1e1e; border: 1px solid #3a3a3a; border-radius: 6px; color: #fff; padding: 10px; font-size: 17px; width: 100%; outline: none; font-family: inherit; -webkit-appearance: none; }
    textarea { font-size: 14px; height: 150px; resize: none; line-height: 1.5; font-family: monospace; }
    input[type=password] { background: #1e1e1e; border: 1px solid #3a3a3a; border-radius: 8px; color: #fff; padding: 14px; font-size: 16px; width: 100%; outline: none; font-family: monospace; }
    button { font-family: inherit; cursor: pointer; }
    button:active { opacity: 0.8; }
    .small-btn { background: transparent; border: 1px solid #444; color: #aaa; border-radius: 6px; width: 38px; height: 38px; font-size: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .section-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
    .outline-btn { width: 100%; background: transparent; border: 1px solid #333; border-radius: 10px; padding: 15px; color: #aaa; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: block; }
    .primary-btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 17px; font-weight: 800; cursor: pointer; font-family: inherit; margin-bottom: 12px; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 28px; }
    .week-cell { text-align: center; background: #141414; border-radius: 8px; padding: 10px 4px; border: 1px solid #1e1e1e; }
    .workout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .workout-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px 16px; cursor: pointer; text-align: left; }
    .ex-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .ex-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .ex-btns { display: flex; gap: 8px; }
    .set-headers { display: grid; grid-template-columns: 34px 1fr 1fr auto; gap: 8px; margin-bottom: 6px; }
    .set-headers span { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; }
    .set-row-w { display: grid; grid-template-columns: 34px 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
    .set-row-s { display: grid; grid-template-columns: 34px 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
    .set-num { color: #555; font-size: 15px; text-align: center; font-weight: 700; }
    .set-unit { color: #777; font-size: 15px; white-space: nowrap; }
    .coach-tip { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 14px; color: #f5c842; font-style: italic; }
    .history-card { background: #161616; border: 1px solid #252525; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
    .history-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .history-ex { font-size: 15px; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 8px; }
    .saved-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
    .page-header { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
var PROGRAM = {
  A: { label:"Push Day", icon:"↑", color:"#ff6b3d", exercises:[
    {id:"bench",   name:"Barbell Bench Press", type:"barbell"},
    {id:"ohp",     name:"Overhead Press",      type:"barbell"},
    {id:"lateral", name:"Lateral Raises",      type:"dumbbell"},
    {id:"tricep",  name:"Tricep Pushdowns",    type:"cable"}
  ]},
  B: { label:"Pull Day", icon:"↓", color:"#4d9fff", exercises:[
    {id:"lat",      name:"Lat Pulldown",      type:"cable"},
    {id:"row",      name:"Barbell Rows",      type:"barbell"},
    {id:"curl",     name:"Bicep Curls",       type:"dumbbell"},
    {id:"facepull", name:"Face Pulls",        type:"cable"},
    {id:"wrist",    name:"Wrist Curls",       type:"dumbbell"},
    {id:"grip",     name:"Grip Strengthener", type:"accessory"}
  ]},
  C: { label:"Floor & Core", icon:"▣", color:"#3dcc88", exercises:[
    {id:"plank",    name:"Plank",             type:"timed"},
    {id:"deadbug",  name:"Dead Bug",          type:"reps"},
    {id:"bridge",   name:"Glute Bridges",     type:"reps"},
    {id:"legraise", name:"Lying Leg Raises",  type:"reps"},
    {id:"superman", name:"Superman Holds",    type:"timed"}
  ]},
  D: { label:"Legs (Progressive)", icon:"⚡", color:"#f5c842", exercises:[
    {id:"goblet",  name:"Goblet Squat",         type:"dumbbell", note:"Start light, shallow ROM"},
    {id:"squat",   name:"Barbell Squat",         type:"barbell",  note:"Add when foot is ready"},
    {id:"rdl",     name:"Romanian Deadlift",     type:"barbell",  note:"Progress after squats"},
    {id:"wallsit", name:"Wall Sit",              type:"timed"},
    {id:"gbheavy", name:"Weighted Glute Bridge", type:"barbell"}
  ]}
};

var WEEK = ["A","B","C","A","B","rest","rest"];
var DAYNAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var LOCAL_KEY = "brian_lift_v2";
var RX_KEY = "brian_lift_rx";
var DEF = {reps:10, weight:0, seconds:30};

// state
var view = "home";
var activeDay = null;
var session = {};
var appData = {sessions:{}, lastDay:null};
var prescriptions = {};
var syncStatus = "local";

// storage
function lLoad() {
  try { var r = localStorage.getItem(LOCAL_KEY); if (r) { var p = JSON.parse(r); if (p && p.sessions) return p; } } catch(e) {}
  return {sessions:{}, lastDay:null};
}
function lSave(d) { try { localStorage.setItem(LOCAL_KEY, JSON.stringify(d)); } catch(e) {} }
function rxLoad() { try { var r = localStorage.getItem(RX_KEY); if (r) return JSON.parse(r); } catch(e) {} return {}; }
function rxSave(d) { try { localStorage.setItem(RX_KEY, JSON.stringify(d)); } catch(e) {} }
function getApiKey() { return localStorage.getItem("brian_api_key") || ""; }
function setApiKey(k) { localStorage.setItem("brian_api_key", k); }

// helpers
function todayKey() { return new Date().toISOString().split("T")[0]; }
function fmtDate(k) { return new Date(k+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function syncBadge() {
  var m = {
    local: '<div style="font-size:13px;font-weight:600;margin-top:8px;color:#888">💾 Saved on device</div>',
    syncing: '<div style="font-size:13px;font-weight:600;margin-top:8px;color:#f5c842">⟳ Syncing…</div>',
    synced: '<div style="font-size:13px;font-weight:600;margin-top:8px;color:#3dcc88">✓ Synced to Drive</div>',
    error: '<div style="font-size:13px;font-weight:600;margin-top:8px;color:#ff6b3d">✗ Saved locally</div>'
  };
  return m[syncStatus] || "";
}

// set/exercise helpers
function getSetData(id) {
  if (session[id] && session[id].sets) return session[id].sets;
  var rx = prescriptions[activeDay] && prescriptions[activeDay][id];
  if (rx) return rx;
  return [Object.assign({}, DEF)];
}
function ensEx(id) { if (!session[id]) session[id] = {sets: getSetData(id)}; }

// actions
function startWorkout(d) {
  var t = todayKey();
  var ex = (appData.sessions[t] && appData.sessions[t].dayType === d) ? appData.sessions[t].data : {};
  activeDay = d; session = JSON.parse(JSON.stringify(ex)); view = "workout"; render();
}
function goHome() { view = "home"; render(); }
function goHistory() { view = "history"; render(); }
function goApiSetup() { view = "apisetup"; render(); }
function goPasteTargets() { view = "pastetargets"; render(); }

function updateSet(id, i, f, v) { ensEx(id); session[id].sets[i][f] = v; }
function addSet(id) { ensEx(id); var s = session[id].sets; s.push(Object.assign({}, s[s.length-1] || DEF)); render(); }
function removeSet(id) { ensEx(id); var s = session[id].sets; if (s.length > 1) { s.pop(); render(); } }

function handleSave() {
  var k = todayKey();
  appData.sessions[k] = {dayType: activeDay, data: session, completedAt: new Date().toISOString()};
  appData.lastDay = activeDay;
  lSave(appData);
  syncStatus = "local";
  view = "saved";
  render();
  setTimeout(function() { view = "home"; render(); }, 1800);
}

function saveApiKey() {
  var inp = document.getElementById("apiKeyInput");
  if (!inp) return;
  var k = inp.value.trim();
  if (!k || k.indexOf("sk-") !== 0) { alert("Please enter a valid API key starting with sk-"); return; }
  setApiKey(k);
  goHome();
}

function applyTargets() {
  var inp = document.getElementById("rxInput");
  if (!inp) return;
  var raw = inp.value.trim();
  try {
    var rx = JSON.parse(raw);
    prescriptions = rx;
    rxSave(rx);
    var msg = document.getElementById("rxMsg");
    if (msg) msg.innerHTML = '<span style="color:#3dcc88;font-weight:700">✓ Targets applied!</span>';
    setTimeout(function() { goHome(); }, 1000);
  } catch(e) {
    var msg = document.getElementById("rxMsg");
    if (msg) msg.innerHTML = '<span style="color:#ff6b3d">✗ Invalid — copy exactly what Claude gave you</span>';
  }
}

function clearTargets() {
  prescriptions = {}; rxSave({});
  var msg = document.getElementById("rxMsg");
  if (msg) msg.innerHTML = '<span style="color:#aaa">Targets cleared.</span>';
  setTimeout(function() { goHome(); }, 800);
}

// render pieces
function setRowHTML(ex, set, i) {
  var n = ex.id, t = ex.type;
  if (t === "timed") return '<div class="set-row-s"><div class="set-num">'+(i+1)+'</div><input type="number" value="'+(set.seconds||30)+'" onchange="updateSet(\''+n+'\','+i+',\'seconds\',+this.value)"><div class="set-unit">sec</div></div>';
  if (t === "reps" || t === "accessory") return '<div class="set-row-s"><div class="set-num">'+(i+1)+'</div><input type="number" value="'+(set.reps||10)+'" onchange="updateSet(\''+n+'\','+i+',\'reps\',+this.value)"><div class="set-unit">reps</div></div>';
  return '<div class="set-row-w"><div class="set-num">'+(i+1)+'</div><input type="number" value="'+(set.reps||10)+'" onchange="updateSet(\''+n+'\','+i+',\'reps\',+this.value)"><input type="number" value="'+(set.weight||0)+'" onchange="updateSet(\''+n+'\','+i+',\'weight\',+this.value)"><div class="set-unit">lbs</div></div>';
}

function exCardHTML(ex, color) {
  var sets = getSetData(ex.id);
  var showH = ["barbell","dumbbell","cable"].indexOf(ex.type) > -1;
  var hasRx = prescriptions[activeDay] && prescriptions[activeDay][ex.id];
  var tip = hasRx ? '<div class="coach-tip">🎯 Coach target loaded</div>' : '';
  var h = '<div class="ex-card" style="border-left:4px solid '+color+'">'
    + tip
    + '<div class="ex-card-top"><div style="flex:1;padding-right:10px">'
    + '<div style="font-weight:700;font-size:19px;color:#fff;line-height:1.3">'+ex.name+'</div>'
    + (ex.note ? '<div style="font-size:14px;color:'+color+';margin-top:4px;font-style:italic">⚠ '+ex.note+'</div>' : '')
    + '<div style="font-size:12px;color:#555;margin-top:3px;text-transform:uppercase;letter-spacing:1.5px">'+ex.type+'</div>'
    + '</div><div class="ex-btns">'
    + '<button class="small-btn" onclick="removeSet(\''+ex.id+'\')">−</button>'
    + '<button class="small-btn" style="border-color:'+color+';color:'+color+'" onclick="addSet(\''+ex.id+'\')">+</button>'
    + '</div></div>';
  if (showH) h += '<div class="set-headers"><span></span><span>Reps</span><span>Weight</span><span></span></div>';
  sets.forEach(function(s, i) { h += setRowHTML(ex, s, i); });
  return h + '</div>';
}

// main render
function render() {
  var app = document.getElementById("app");
  if (!app) return;

  // API setup screen
  if (view === "apisetup") {
    app.innerHTML = '<div style="padding:40px 20px">'
      + '<div class="page-header"><button class="small-btn" style="font-size:22px" onclick="goHome()">←</button><div style="font-size:26px;font-weight:800">API Key Setup</div></div>'
      + '<div style="font-size:15px;color:#aaa;margin-bottom:24px;line-height:1.6">Paste your Anthropic API key. Stored on this device only — never in GitHub.</div>'
      + '<div class="section-label">Anthropic API Key</div>'
      + '<input type="password" id="apiKeyInput" placeholder="sk-ant-..." style="margin-bottom:16px">'
      + '<button class="primary-btn" style="background:#3dcc88;color:#000" onclick="saveApiKey()">Save Key →</button>'
      + '<div style="margin-top:12px;font-size:12px;color:#444;text-align:center">Get your key at console.anthropic.com</div>'
      + '</div>';
    return;
  }

  // Paste targets screen
  if (view === "pastetargets") {
    app.innerHTML = '<div style="padding:40px 20px">'
      + '<div class="page-header"><button class="small-btn" style="font-size:22px" onclick="goHome()">←</button><div style="font-size:26px;font-weight:800">Coach Targets</div></div>'
      + '<div style="font-size:15px;color:#aaa;margin-bottom:24px;line-height:1.6">Paste the target code Claude gave you. This pre-fills your next workout with the right weights and reps.</div>'
      + '<div class="section-label">Target Code</div>'
      + '<textarea id="rxInput" placeholder="Paste JSON code here..."></textarea>'
      + '<button class="primary-btn" style="background:#f5c842;color:#000;margin-top:12px" onclick="applyTargets()">Apply Targets ✓</button>'
      + '<button class="outline-btn" onclick="clearTargets()">Clear All Targets</button>'
      + '<div id="rxMsg" style="margin-top:8px;font-size:14px;text-align:center;min-height:20px"></div>'
      + '</div>';
    return;
  }

  // Saved confirmation
  if (view === "saved") {
    app.innerHTML = '<div class="saved-screen">'
      + '<div style="font-size:70px;color:#3dcc88">✓</div>'
      + '<div style="color:#f0f0f0;font-weight:700;font-size:24px">Workout Saved!</div>'
      + syncBadge()
      + '</div>';
    return;
  }

  // Workout screen
  if (view === "workout") {
    var day = PROGRAM[activeDay];
    var h = '<div class="page-header">'
      + '<button class="small-btn" style="font-size:22px" onclick="goHome()">←</button>'
      + '<div><div style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:2px">Today</div>'
      + '<div style="font-size:28px;font-weight:800;color:'+day.color+'">'+day.icon+' '+day.label+'</div></div></div>';
    day.exercises.forEach(function(ex) { h += exCardHTML(ex, day.color); });
    h += '<button style="width:100%;padding:17px;border:none;border-radius:10px;background:'+day.color+';color:#000;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-top:10px;cursor:pointer;font-family:inherit" onclick="handleSave()">Save Workout ✓</button>';
    app.innerHTML = h;
    return;
  }

  // History screen
  if (view === "history") {
    var keys = Object.keys(appData.sessions).sort().reverse();
    var h = '<div class="page-header">'
      + '<button class="small-btn" style="font-size:22px" onclick="goHome()">←</button>'
      + '<div style="font-size:26px;font-weight:800">Session History</div></div>';
    if (!keys.length) {
      h += '<div style="color:#555;text-align:center;margin-top:60px;font-size:17px">No sessions logged yet.</div>';
    } else {
      keys.forEach(function(dk) {
        var s = appData.sessions[dk], d = PROGRAM[s.dayType]; if (!d) return;
        h += '<div class="history-card" style="border-left:4px solid '+d.color+'">'
          + '<div class="history-card-top">'
          + '<span style="font-weight:700;font-size:18px;color:'+d.color+'">'+d.icon+' '+d.label+'</span>'
          + '<span style="color:#777;font-size:15px">'+fmtDate(dk)+'</span></div>';
        d.exercises.forEach(function(ex) {
          var ed = s.data && s.data[ex.id]; if (!ed || !ed.sets) return;
          var sum = ed.sets.map(function(set) {
            if (ex.type === "timed") return set.seconds+"s";
            if (ex.type === "reps" || ex.type === "accessory") return set.reps+"r";
            return set.reps+"×"+set.weight+"lb";
          }).join("  ");
          h += '<div class="history-ex"><span style="color:#bbb">'+ex.name+'</span><span style="color:#666;font-family:monospace;font-size:14px">'+sum+'</span></div>';
        });
        h += '</div>';
      });
    }
    app.innerHTML = h;
    return;
  }

  // Home screen
  var order = ["A","B","C","D"];
  var ni = appData.lastDay ? (order.indexOf(appData.lastDay)+1) % order.length : 0;
  var sug = order[ni], sd = PROGRAM[sug];
  var ts = appData.sessions[todayKey()];
  var hasRx = Object.keys(prescriptions).length > 0;

  var h = '<div style="margin-bottom:30px">'
    + '<div style="font-size:13px;color:#666;text-transform:uppercase;letter-spacing:3px;margin-bottom:4px">Brian\'s</div>'
    + '<div style="font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1">LIFT TRACKER</div>'
    + syncBadge()
    + (ts ? '<div style="font-size:15px;color:#3dcc88;margin-top:8px;font-weight:600">✓ '+PROGRAM[ts.dayType].label+' logged today</div>' : '')
    + '</div>'

    + '<div class="section-label">'+(appData.lastDay ? "Up Next" : "Start Here")+'</div>'
    + '<button onclick="startWorkout(\''+sug+'\')" style="width:100%;background:'+sd.color+';border:none;border-radius:12px;padding:22px;cursor:pointer;text-align:left;position:relative;overflow:hidden;margin-bottom:26px">'
    + '<div style="font-size:72px;font-weight:900;color:rgba(0,0,0,0.12);position:absolute;right:10px;top:50%;transform:translateY(-50%);line-height:1;pointer-events:none">'+sd.icon+'</div>'
    + '<div style="font-size:12px;color:rgba(0,0,0,0.45);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px">Tap to start</div>'
    + '<div style="font-size:26px;font-weight:800;color:#000">'+sd.label+'</div>'
    + '<div style="font-size:15px;color:rgba(0,0,0,0.45);margin-top:4px">'+sd.exercises.length+' exercises</div></button>'

    + '<div class="section-label">All Workouts</div>'
    + '<div class="workout-grid">';

  Object.keys(PROGRAM).forEach(function(k) {
    var d = PROGRAM[k], isSug = k === sug;
    var hasPx = prescriptions[k] && Object.keys(prescriptions[k]).length > 0;
    h += '<button class="workout-card" style="'+(isSug ? 'background:#1e1e1e;border-color:'+d.color+'88' : '')+'" onclick="startWorkout(\''+k+'\')">'
      + '<div style="font-size:24px">'+d.icon+'</div>'
      + '<div style="font-size:17px;font-weight:700;color:'+d.color+';margin-top:6px">'+d.label+'</div>'
      + '<div style="font-size:13px;color:#666;margin-top:3px">'+d.exercises.length+' ex'+(hasPx ? ' · 🎯' : '')+'</div></button>';
  });

  h += '</div>'
    + '<div class="section-label">Suggested Week</div>'
    + '<div class="week-grid">';

  WEEK.forEach(function(d, i) {
    var p = d !== "rest" ? PROGRAM[d] : null;
    h += '<div class="week-cell" style="'+(p ? 'border-color:'+p.color+'44' : '')+'">'
      + '<div style="font-size:11px;color:#555;margin-bottom:5px">'+DAYNAMES[i]+'</div>'
      + '<div style="font-size:15px;font-weight:800;color:'+(p ? p.color : "#333")+'">'+( d !== "rest" ? d : "–")+'</div></div>';
  });

  h += '</div>'
    + '<div style="background:#141414;border:1px solid #252525;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:15px;color:#aaa;line-height:1.7"><strong style="color:#fff">Daily:</strong> 15 min walk · Peloton on rest days</div>'
    + '<button class="outline-btn" onclick="goHistory()">View History →</button>'
    + '<button class="outline-btn" style="border-color:#f5c842;color:#f5c842" onclick="goPasteTargets()">🎯 Paste Coach Targets</button>'
    + '<button class="outline-btn" style="color:#333;border-color:#222;font-size:13px" onclick="goApiSetup()">⚙ API Key</button>'
    + '<div style="margin-top:22px;font-size:13px;color:#3a3a3a;text-align:center;line-height:1.8">Leg Day — start with goblet squats.<br>Progress to barbell when foot allows.</div>';

  app.innerHTML = h;
}

// boot
appData = lLoad();
prescriptions = rxLoad();
render();
</script>
</body>
</html>
