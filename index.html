<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lift Tracker" />
  <title>Brian's Lift Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #f0f0f0; font-family: Georgia, serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    #app { max-width: 500px; margin: 0 auto; padding: 32px 18px 80px; }
    input[type=number] { background: #1e1e1e; border: 1px solid #3a3a3a; border-radius: 6px; color: #fff; padding: 10px; font-size: 17px; width: 100%; outline: none; font-family: inherit; -webkit-appearance: none; }
    button { font-family: inherit; cursor: pointer; }
    button:active { opacity: 0.8; }
    .small-btn { background: transparent; border: 1px solid #444; color: #aaa; border-radius: 6px; width: 38px; height: 38px; font-size: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header { margin-bottom: 30px; }
    .header-sub { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 4px; }
    .header-title { font-size: 36px; font-weight: 900; color: #fff; letter-spacing: -1px; line-height: 1; }
    .sync-badge { font-size: 13px; font-weight: 600; margin-top: 8px; min-height: 18px; }
    .today-badge { font-size: 15px; color: #3dcc88; margin-top: 8px; font-weight: 600; }
    .section-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
    .suggested-btn { width: 100%; border: none; border-radius: 12px; padding: 22px; cursor: pointer; text-align: left; position: relative; overflow: hidden; margin-bottom: 26px; }
    .bg-icon { font-size: 72px; font-weight: 900; color: rgba(0,0,0,0.12); position: absolute; right: 10px; top: 50%; transform: translateY(-50%); line-height: 1; pointer-events: none; }
    .tap-label { font-size: 12px; color: rgba(0,0,0,0.45); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
    .day-name { font-size: 26px; font-weight: 800; color: #000; letter-spacing: -0.5px; }
    .ex-count { font-size: 15px; color: rgba(0,0,0,0.45); margin-top: 4px; }
    .workout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .workout-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px 16px; cursor: pointer; text-align: left; }
    .card-icon { font-size: 24px; }
    .card-name { font-size: 17px; font-weight: 700; margin-top: 6px; }
    .card-count { font-size: 13px; color: #666; margin-top: 3px; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 28px; }
    .week-cell { text-align: center; background: #141414; border-radius: 8px; padding: 10px 4px; border: 1px solid #1e1e1e; }
    .wday { font-size: 11px; color: #555; margin-bottom: 5px; }
    .wlabel { font-size: 15px; font-weight: 800; }
    .cardio-note { background: #141414; border: 1px solid #252525; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; font-size: 15px; color: #aaa; line-height: 1.7; }
    .cardio-note strong { color: #fff; }
    .outline-btn { width: 100%; background: transparent; border: 1px solid #333; border-radius: 10px; padding: 15px; color: #aaa; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .drive-info { background: #141414; border: 1px solid #252525; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #555; line-height: 1.7; text-align: center; }
    .footer-note { margin-top: 22px; font-size: 13px; color: #3a3a3a; text-align: center; line-height: 1.8; }
    .workout-header { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
    .workout-header-sub { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
    .workout-header-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
    .coach-tip { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 14px; color: #f5c842; font-style: italic; line-height: 1.5; }
    .ex-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .ex-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .ex-name { font-weight: 700; font-size: 19px; color: #fff; line-height: 1.3; }
    .ex-note { font-size: 14px; margin-top: 4px; font-style: italic; }
    .ex-type-lbl { font-size: 12px; color: #555; margin-top: 3px; text-transform: uppercase; letter-spacing: 1.5px; }
    .ex-btns { display: flex; gap: 8px; }
    .set-headers { display: grid; grid-template-columns: 34px 1fr 1fr auto; gap: 8px; margin-bottom: 6px; }
    .set-headers span { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; }
    .set-row-w { display: grid; grid-template-columns: 34px 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
    .set-row-s { display: grid; grid-template-columns: 34px 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
    .set-num { color: #555; font-size: 15px; text-align: center; font-weight: 700; }
    .set-unit { color: #777; font-size: 15px; white-space: nowrap; }
    .save-btn { width: 100%; padding: 17px; border: none; border-radius: 10px; font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
    .saved-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
    .saved-check { font-size: 70px; color: #3dcc88; }
    .saved-text { color: #f0f0f0; font-weight: 700; font-size: 24px; }
    .history-header { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
    .history-title { font-size: 26px; font-weight: 800; }
    .history-empty { color: #555; text-align: center; margin-top: 60px; font-size: 17px; }
    .history-card { background: #161616; border: 1px solid #252525; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
    .history-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .history-day { font-weight: 700; font-size: 18px; }
    .history-date { color: #777; font-size: 15px; }
    .history-ex { font-size: 15px; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 8px; }
    .history-ex-name { color: #bbb; }
    .history-ex-data { color: #666; font-family: monospace; font-size: 14px; text-align: right; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
var ANTHROPIC_API_KEY = localStorage.getItem("brian_api_key") || "";

var PROGRAM = {
  A: { label:"Push Day", icon:"↑", color:"#ff6b3d", exercises:[
    {id:"bench",   name:"Barbell Bench Press", type:"barbell"},
    {id:"ohp",     name:"Overhead Press",      type:"barbell"},
    {id:"lateral", name:"Lateral Raises",       type:"dumbbell"},
    {id:"tricep",  name:"Tricep Pushdowns",     type:"cable"}
  ]},
  B: { label:"Pull Day", icon:"↓", color:"#4d9fff", exercises:[
    {id:"lat",      name:"Lat Pulldown",       type:"cable"},
    {id:"row",      name:"Barbell Rows",       type:"barbell"},
    {id:"curl",     name:"Bicep Curls",        type:"dumbbell"},
    {id:"facepull", name:"Face Pulls",         type:"cable"},
    {id:"wrist",    name:"Wrist Curls",        type:"dumbbell"},
    {id:"grip",     name:"Grip Strengthener",  type:"accessory"}
  ]},
  C: { label:"Floor & Core", icon:"▣", color:"#3dcc88", exercises:[
    {id:"plank",    name:"Plank",            type:"timed"},
    {id:"deadbug",  name:"Dead Bug",         type:"reps"},
    {id:"bridge",   name:"Glute Bridges",    type:"reps"},
    {id:"legraise", name:"Lying Leg Raises", type:"reps"},
    {id:"superman", name:"Superman Holds",   type:"timed"}
  ]},
  D: { label:"Legs (Progressive)", icon:"⚡", color:"#f5c842", exercises:[
    {id:"goblet",   name:"Goblet Squat",          type:"dumbbell", note:"Start light, shallow ROM"},
    {id:"squat",    name:"Barbell Squat",          type:"barbell",  note:"Add when foot is ready"},
    {id:"rdl",      name:"Romanian Deadlift",      type:"barbell",  note:"Progress after squats"},
    {id:"wallsit",  name:"Wall Sit",               type:"timed"},
    {id:"gbheavy",  name:"Weighted Glute Bridge",  type:"barbell"}
  ]}
};

var WEEK=["A","B","C","A","B","rest","rest"], DAYNAMES=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var LOCAL_KEY="brian_lift_v2", DRIVE_FILE="brian_lift_tracker.json", PRESCRIPTION_FILE="brian_lift_prescription.json";
var DEF={reps:10,weight:0,seconds:30};
var view="home", activeDay=null, session={}, syncStatus="local", appData={sessions:{},lastDay:null}, prescriptions={};

// ── Local storage ─────────────────────────────────────────────────────────────
function lLoad(){try{var r=localStorage.getItem(LOCAL_KEY);if(r){var p=JSON.parse(r);if(p&&p.sessions)return p;}}catch(e){}return{sessions:{},lastDay:null};}
function lSave(d){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(d));}catch(e){}}
function pLoad(){try{var r=localStorage.getItem(LOCAL_KEY+"_rx");if(r)return JSON.parse(r);}catch(e){}return{};}
function pSave(d){try{localStorage.setItem(LOCAL_KEY+"_rx",JSON.stringify(d));}catch(e){}}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayKey(){return new Date().toISOString().split("T")[0];}
function fmtDate(k){return new Date(k+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function syncHTML(){
  var m={local:'<div class="sync-badge" style="color:#888">💾 Saved on device</div>',syncing:'<div class="sync-badge" style="color:#f5c842">⟳ Syncing…</div>',synced:'<div class="sync-badge" style="color:#3dcc88">✓ Synced to Drive</div>',error:'<div class="sync-badge" style="color:#ff6b3d">✗ Drive unavailable — saved locally</div>'};
  return m[syncStatus]||'';
}

// ── Anthropic API call ────────────────────────────────────────────────────────
function apiCall(system, userMsg, onSuccess, onFail) {
  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1024,
      system: system,
      messages: [{role:"user", content: userMsg}],
      mcp_servers: [{type:"url", url:"https://drivemcp.googleapis.com/mcp/v1", name:"gdrive"}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var tb = data.content && data.content.find(function(b){return b.type==="text";});
    if(tb) onSuccess(tb.text);
    else onFail("No response");
  })
  .catch(function(e){ onFail(e.message); });
}

// ── Drive sync ────────────────────────────────────────────────────────────────
function driveSave(d) {
  syncStatus="syncing"; render();
  apiCall(
    "You manage Google Drive files. When asked to save JSON to a filename, write it to that file in the user's Drive root and return {\"success\":true}. Respond ONLY with JSON.",
    "Save to "+DRIVE_FILE+": "+JSON.stringify(d),
    function(){ syncStatus="synced"; lSave(d); render(); },
    function(){ syncStatus="error"; render(); }
  );
}

function driveLoadPrescriptions() {
  apiCall(
    "You manage Google Drive files. Read the requested file and return its JSON contents. If missing return {}. Respond ONLY with JSON.",
    "Read "+PRESCRIPTION_FILE+" from my Google Drive and return its JSON contents. If missing return {}.",
    function(text){
      try{
        var clean=text.replace(/```json|```/g,"").trim();
        prescriptions=JSON.parse(clean);
        pSave(prescriptions);
        render();
      }catch(e){}
    },
    function(){}
  );
}

function driveSavePrescriptions(rx) {
  prescriptions = rx;
  pSave(rx);
  apiCall(
    "You manage Google Drive files. Save JSON to a file in the user's Drive root. Return {\"success\":true}. Respond ONLY with JSON.",
    "Save to "+PRESCRIPTION_FILE+": "+JSON.stringify(rx),
    function(){},
    function(){}
  );
}

// ── Session/exercise state ────────────────────────────────────────────────────
function getSetData(id){
  // If there's a prescription for this exercise in the active day, use it as default
  var rx = prescriptions && prescriptions[activeDay] && prescriptions[activeDay][id];
  if(session[id] && session[id].sets) return session[id].sets;
  if(rx) return rx;
  return [Object.assign({},DEF)];
}
function ensEx(id){if(!session[id])session[id]={sets:getSetData(id)};}
function startWorkout(d){
  var t=todayKey(),ex=(appData.sessions[t]&&appData.sessions[t].dayType===d)?appData.sessions[t].data:{};
  activeDay=d; session=JSON.parse(JSON.stringify(ex)); view="workout"; render();
}
function goHome(){view="home";render();}
function goHistory(){view="history";render();}
function updateSet(id,i,f,v){ensEx(id);session[id].sets[i][f]=v;}
function addSet(id){ensEx(id);var s=session[id].sets;s.push(Object.assign({},s[s.length-1]||DEF));render();}
function removeSet(id){ensEx(id);var s=session[id].sets;if(s.length>1){s.pop();render();}}

function handleSave(){
  var k=todayKey();
  appData=Object.assign({},appData,{
    lastDay:activeDay,
    sessions:Object.assign({},appData.sessions,{
      [k]:{dayType:activeDay,data:session,completedAt:new Date().toISOString()}
    })
  });
  syncStatus="local"; lSave(appData); view="saved"; render();
  driveSave(appData);
  setTimeout(function(){view="home";render();},1800);
}

// ── Render helpers ────────────────────────────────────────────────────────────
function setRow(ex,set,i){
  var n=ex.id,t=ex.type;
  if(t==="timed")return'<div class="set-row-s"><div class="set-num">'+(i+1)+'</div><input type="number" value="'+(set.seconds||30)+'" onchange="updateSet(\''+n+'\','+i+',\'seconds\',+this.value)"><div class="set-unit">sec</div></div>';
  if(t==="reps"||t==="accessory")return'<div class="set-row-s"><div class="set-num">'+(i+1)+'</div><input type="number" value="'+(set.reps||10)+'" onchange="updateSet(\''+n+'\','+i+',\'reps\',+this.value)"><div class="set-unit">reps</div></div>';
  return'<div class="set-row-w"><div class="set-num">'+(i+1)+'</div><input type="number" value="'+(set.reps||10)+'" onchange="updateSet(\''+n+'\','+i+',\'reps\',+this.value)"><input type="number" value="'+(set.weight||0)+'" onchange="updateSet(\''+n+'\','+i+',\'weight\',+this.value)"><div class="set-unit">lbs</div></div>';
}

function exCard(ex,color){
  var sets=getSetData(ex.id);
  var showH=["barbell","dumbbell","cable"].indexOf(ex.type)>-1;
  var rx=prescriptions&&prescriptions[activeDay]&&prescriptions[activeDay][ex.id];
  var tipHTML=rx?'<div class="coach-tip">🎯 Coach target loaded</div>':'';
  var h='<div class="ex-card" style="border-left:4px solid '+color+'">'+tipHTML+'<div class="ex-card-top"><div style="flex:1;padding-right:10px"><div class="ex-name">'+ex.name+'</div>'+(ex.note?'<div class="ex-note" style="color:'+color+'">⚠ '+ex.note+'</div>':'')+'<div class="ex-type-lbl">'+ex.type+'</div></div><div class="ex-btns"><button class="small-btn" onclick="removeSet(\''+ex.id+'\')">−</button><button class="small-btn" style="border-color:'+color+';color:'+color+'" onclick="addSet(\''+ex.id+'\')">+</button></div></div>';
  if(showH)h+='<div class="set-headers"><span></span><span>Reps</span><span>Weight</span><span></span></div>';
  sets.forEach(function(s,i){h+=setRow(ex,s,i);});
  return h+'</div>';
}

// ── Main render ───────────────────────────────────────────────────────────────
function showApiSetup(){
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML='<div style="padding:40px 20px;max-width:440px;margin:0 auto">'
    +'<div style="font-size:13px;color:#666;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px">Brian\'s</div>'
    +'<div style="font-size:32px;font-weight:900;color:#fff;margin-bottom:8px">LIFT TRACKER</div>'
    +'<div style="font-size:15px;color:#aaa;margin-bottom:32px;line-height:1.6">Paste your Anthropic API key below. Stored on this device only.</div>'
    +'<div style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Anthropic API Key</div>'
    +'<input id="apiKeyInput" type="password" placeholder="sk-ant-..." style="background:#1e1e1e;border:1px solid #3a3a3a;border-radius:8px;color:#fff;padding:14px;font-size:16px;width:100%;outline:none;margin-bottom:16px;font-family:monospace">'
    +'<button onclick="saveApiKey()" style="width:100%;padding:16px;background:#3dcc88;border:none;border-radius:10px;color:#000;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:12px">Save & Start →</button>'
    +'<button onclick="goHome()" style="width:100%;padding:14px;background:transparent;border:1px solid #333;border-radius:10px;color:#666;font-size:15px;cursor:pointer;font-family:inherit">Cancel</button>'
    +'<div style="margin-top:16px;font-size:12px;color:#444;text-align:center;line-height:1.7">Get your key at console.anthropic.com<br>Key is stored locally on this device only.</div>'
    +'</div>';
}

function saveApiKey(){
  var key = document.getElementById("apiKeyInput").value.trim();
  if(!key || !key.startsWith("sk-")){
    alert("Please enter a valid API key starting with sk-");
    return;
  }
  localStorage.setItem("brian_api_key", key);
  ANTHROPIC_API_KEY = key;
  render();
  driveLoadPrescriptions();
}

function render(){
  var app=document.getElementById("app"); if(!app)return;

  if(view==="saved"){
    app.innerHTML='<div class="saved-screen"><div class="saved-check">✓</div><div class="saved-text">Workout Saved!</div>'+syncHTML()+'</div>';
    return;
  }

  if(view==="workout"){
    var day=PROGRAM[activeDay];
    var h='<div class="workout-header"><button class="small-btn" style="font-size:22px" onclick="goHome()">←</button><div><div class="workout-header-sub">Today\'s Workout</div><div class="workout-header-title" style="color:'+day.color+'">'+day.icon+' '+day.label+'</div></div></div>';
    day.exercises.forEach(function(ex){h+=exCard(ex,day.color);});
    h+='<button class="save-btn" style="background:'+day.color+';color:#000" onclick="handleSave()">Save Workout ✓</button>';
    app.innerHTML=h; return;
  }

  if(view==="history"){
    var keys=Object.keys(appData.sessions).sort().reverse();
    var h='<div class="history-header"><button class="small-btn" style="font-size:22px" onclick="goHome()">←</button><div class="history-title">Session History</div></div>';
    if(!keys.length){h+='<div class="history-empty">No sessions logged yet.</div>';}
    else keys.forEach(function(dk){
      var s=appData.sessions[dk],d=PROGRAM[s.dayType]; if(!d)return;
      h+='<div class="history-card" style="border-left:4px solid '+d.color+'"><div class="history-card-top"><span class="history-day" style="color:'+d.color+'">'+d.icon+' '+d.label+'</span><span class="history-date">'+fmtDate(dk)+'</span></div>';
      d.exercises.forEach(function(ex){
        var ed=s.data&&s.data[ex.id]; if(!ed||!ed.sets)return;
        var sum=ed.sets.map(function(set){
          if(ex.type==="timed")return set.seconds+"s";
          if(ex.type==="reps"||ex.type==="accessory")return set.reps+"r";
          return set.reps+"×"+set.weight+"lb";
        }).join("  ");
        h+='<div class="history-ex"><span class="history-ex-name">'+ex.name+'</span><span class="history-ex-data">'+sum+'</span></div>';
      });
      h+='</div>';
    });
    app.innerHTML=h; return;
  }

  // ── Home ──
  var order=["A","B","C","D"],ni=appData.lastDay?(order.indexOf(appData.lastDay)+1)%order.length:0,sug=order[ni],sd=PROGRAM[sug],ts=appData.sessions[todayKey()];
  var h='<div class="header"><div class="header-sub">Brian\'s</div><div class="header-title">LIFT TRACKER</div>'+syncHTML()+(ts?'<div class="today-badge">✓ '+PROGRAM[ts.dayType].label+' logged today</div>':'')+' </div>'
    +'<div class="section-label">'+(appData.lastDay?"Up Next":"Start Here")+'</div>'
    +'<button class="suggested-btn" style="background:'+sd.color+'" onclick="startWorkout(\''+sug+'\')">'
    +'<div class="bg-icon">'+sd.icon+'</div><div class="tap-label">Tap to start</div><div class="day-name">'+sd.label+'</div><div class="ex-count">'+sd.exercises.length+' exercises</div></button>'
    +'<div class="section-label">All Workouts</div><div class="workout-grid">';
  Object.keys(PROGRAM).forEach(function(k){
    var d=PROGRAM[k],s=k===sug;
    var hasPx=prescriptions&&prescriptions[k]&&Object.keys(prescriptions[k]).length>0;
    h+='<button class="workout-card" style="'+(s?'background:#1e1e1e;border-color:'+d.color+'88':'')+'" onclick="startWorkout(\''+k+'\')">'
      +'<div class="card-icon">'+d.icon+'</div>'
      +'<div class="card-name" style="color:'+d.color+'">'+d.label+'</div>'
      +'<div class="card-count">'+d.exercises.length+' exercises'+(hasPx?' · 🎯 targets set':'')+'</div></button>';
  });
  h+='</div><div class="section-label">Suggested Week</div><div class="week-grid">';
  WEEK.forEach(function(d,i){var p=d!=="rest"?PROGRAM[d]:null;h+='<div class="week-cell" style="'+(p?'border-color:'+p.color+'44':'')+'"><div class="wday">'+DAYNAMES[i]+'</div><div class="wlabel" style="color:'+(p?p.color:"#333")+'">'+(d!=="rest"?d:"–")+'</div></div>';});
  h+='</div><div class="cardio-note"><strong>Daily:</strong> 15 min walk · Peloton on rest days</div>'
    +'<button class="outline-btn" onclick="goHistory()">View History →</button>'
    +'<div class="drive-info">Syncs to Google Drive · Ask Claude to update your targets anytime.</div>'
